{% extends 'base.html' %}
{% block content %}

{% load cart %}
{% load custom_filter %}

<div class="container py-3">
  <!-- Category Section -->
  <div class="dropdown">
    <button class="btn border border-dark rounded-1 text-muted dropdown-toggle" style="font-size: 14px;" type="button" data-bs-toggle="dropdown" aria-expanded="false">
      {% if request.GET.category %}
        {{ selected_category.name }}
      {% else %}
        All Products
      {% endif %}
    </button>
    <ul class="dropdown-menu">
      <li><a class="dropdown-item" href="/">All Products</a></li>
      <li><hr class="dropdown-divider"></li>
      {% for category in categories %}
      <li><a class="dropdown-item" href="/?category={{category.id}}">{{ category.name }}</a></li>
      {% endfor %}
    </ul>
  </div>
</div>
<!-- Products -->
<div id="products" class="d-flex flex-wrap justify-content-center gap-4 px-4 pb-5">
  {% for product in data %}
  <a href="{% url 'product_detail' product.id %}" class="text-decoration-none text-body">
    <div class="card border-0 shadow-sm rounded-1 bg-light h-100" style="width: 260px;" id="{{product.id}}">
      <img src="{{product.image.url}}" alt="{{product.name}}" class="card-img-top" style="height: 260px; object-fit: cover;">
      <div class="card-body d-flex flex-column text-center">
        <p class="mb-auto">{{product.name}}</p>
        <div>
          <p>{{ product.price|currency }}</p>
        </div>
      </div>
    </div>
  </a>
  {% endfor %}
</div>
{% endblock %}
