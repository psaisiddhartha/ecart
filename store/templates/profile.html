{% extends 'base.html' %}

{% block content %}

<div class="container py-5">
  <div class="d-flex justify-content-center">
    <div class="card shadow border-0" style="width: 500px;">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-5">    
          <h4 class="mb-0 fw-semibold">Profile Information</h4>
          <button type="button" class="btn btn-primary rounded-1 py-1" onclick="enableEdit()">Edit</button>
        </div>
        <form method="POST">
          {% csrf_token %}
          <div class="d-flex flex-column">
            <div class="d-flex align-items-center mb-3">
              <label class="form-label" style="width: 120px;">Name</label>
              <input id="name" type="text" name="name" class="form-control editable-field rounded-1 shadow-none" value="{{ customer.name }}" disabled>
            </div>
            <div class="d-flex align-items-center mb-3">
              <label class="form-label" style="width: 120px;">
                Email
                <span class="text-danger">*</span>
              </label>
              <input id="email" type="email" name="email" class="form-control editable-field rounded-1 shadow-none" value="{{ customer.email }}" disabled>
            </div>
            <div class="d-flex align-items-center mb-3">
              <label class="form-label" style="width: 120px;">Phone</label>
              <input id="phone" type="text" name="phone" class="form-control editable-field rounded-1 shadow-none" value="{{ customer.phone }}" disabled>
            </div>
            <div class="d-flex align-items-center mb-4">
              <label class="form-label" style="width: 120px;">Address</label>
              <textarea id="addressField" name="address" class="form-control editable-field rounded-1 shadow-none" rows="2" disabled>{{ customer.address }}</textarea>
            </div>
            <div class="text-end">
              <button id="saveBtn" type="submit" class="btn btn-warning rounded-1 py-1" disabled>Save</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function enableEdit() {
  document.querySelectorAll(".editable-field").forEach(field => {
    field.disabled = false;
  });
  document.getElementById("saveBtn").disabled = false;
}
</script>

{% endblock %}
