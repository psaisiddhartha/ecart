{% extends 'base.html' %}

{% block content %}

<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow border-0 rounded-1" style="max-width: 700px; width: 100%;">
    <div class="d-flex flex-wrap">
      <!-- Left Panel -->
      <div class="bg-light px-3 py-4 d-flex flex-column justify-content-between" style="width: 300px; min-height: 450px;">
        <div>
          <h2 class="mb-3">Login</h2>
          <p class="mb-0">Shop with ease, get access to your orders, manage your account</p>
        </div>
        <div class="text-center">
          <img src="../../uploads/logo/signin.jpg" class="img-fluid" alt="Login Illustration">
        </div>
      </div>
      <!-- Right Panel -->
      <div class="flex-fill d-flex flex-column px-3 py-4">
        <form action="/login" method="POST">
          {% csrf_token %}
          <div class=" form-floating mb-3">
            <input type="email" name="email" value="" id="floatingInput" class="form-control border-0 border-bottom rounded-1 shadow-none" placeholder="name@example.com" required>
            <label for="floatingInput">
              Enter email
              <span class="text-danger">*</span>
            </label>
          </div>
          <button type="submit" class="btn btn-warning py-1 rounded-1 mx-auto">Send OTP</button>
        </form>
        <div class="mt-auto text-center">
          <small class="text-muted">New to <b>eCart?</b></small>
          <a href="/signup" class="text-decoration-none ms-1">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
