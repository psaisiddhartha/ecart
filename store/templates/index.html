{% extends 'base.html' %}

{% block content %}

{% load cart %}
{% load custom_filter %}

<!-- Category Section -->
<div class="container my-4">
  <div class="dropdown">
    <button class="btn border border-dark rounded-1 text-muted dropdown-toggle" style="font-size: 14px;" type="button" data-bs-toggle="dropdown">
      {% if request.GET.category %}
        {{ selected_category.name }}
      {% else %}
        All Products
      {% endif %}
    </button>
    <ul class="dropdown-menu rounded-0">
      <li><a class="dropdown-item" style="font-size: 14px;" href="/">All Products</a></li>
      <li><hr class="dropdown-divider"></li>
      {% for category in categories %}
      <li><a class="dropdown-item" style="font-size: 14px;" href="/?category={{category.id}}">{{ category.name }}</a></li>
      {% endfor %}
    </ul>
  </div>
</div>
<!-- Products -->
<div id="products" class="d-flex flex-wrap justify-content-center gap-4 px-4 pb-5">
  {% for product in products %}
  <a href="{% url 'product_detail' product.id %}" class="text-decoration-none text-body">
    <div class="card border shadow-sm rounded-1 h-100" style="width: 260px; overflow: hidden;" id="{{product.id}}">
      <img src="{{product.image.url}}" alt="{{product.name}}" class="card-image-top object-fit-contain" style="height: 260px;">
      <div class="card-body d-flex flex-column text-center bg-light">
        <p class="mb-0">{{product.name}}</p>
        <p class="mb-0">{{ product.price|currency }}</p>
      </div>
    </div>
  </a>
  {% endfor %}
</div>
{% endblock %}
