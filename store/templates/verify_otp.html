{% extends 'base.html' %}

{% block content %}

<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow border-0 rounded-1" style="max-width: 700px; width: 100%;">
    <div class="d-flex flex-wrap">
      <!-- Left Panel -->
      <div class="bg-light px-3 py-4 d-flex flex-column justify-content-between" style="width: 300px; min-height: 450px;">
        <div>
          <h2 class="mb-3">Verify OTP</h2>
          <p class="mb-0">You're just one step away from enjoying a seamless shopping experience</p>
        </div>
        <div class="text-center">
          <img src="../../uploads/logo/image.jpg" class="img-fluid" alt="OTP Verification">
        </div>
      </div>
      <!-- Right Panel -->
      <div class="flex-fill px-3 py-4">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
            <span>{{ email }}</span>
            {% if purpose == 'login' %}
            <a href="{% url 'login' %}" class="text-decoration-none" style="font-size: 14px;">Change</a>
            {% elif purpose == 'signup' %}
            <a href="{% url 'signup' %}" class="text-decoration-none" style="font-size: 14px;">Change</a>
            {% endif %}
        </div>
        <form method="POST">
          {% csrf_token %}
          <div class="form-floating mb-3">
            <input type="text" name="otp" maxlength="6" id="floatingInput" class="form-control border-0 border-bottom rounded-0 shadow-none" placeholder="Enter 6-digit OTP" required>
            <label for="floatingInput">Enter 6-digit OTP</label>
          </div>
          <button type="submit" class="btn btn-warning text-muted rounded-1 py-1 d-block mx-auto">Verify OTP</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
